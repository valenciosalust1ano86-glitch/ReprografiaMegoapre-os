<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reprografia Megoa Serviço — Calculadora de Preços</title>
<style>
  :root{
    --sheet-top: #f3f5f0;
    --sheet-carbon: #e8d6ce;
    --ink: #202b23;
    --ink-soft: #4b5a4f;
    --stamp: #b9791f;
    --line: #3a5a73;
    --paper-edge: #d8dcd3;
    --danger: #9a3324;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#c9cdc3;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:24px 12px 60px;
    min-height:100vh;
  }
  .stack{
    position:relative;
    width:100%;
    max-width:460px;
  }
  /* carbon copy peeking out behind */
  .carbon{
    position:absolute;
    top:10px; left:10px; right:-10px; bottom:-10px;
    background:var(--sheet-carbon);
    border-radius:2px;
    transform:rotate(0.6deg);
  }
  .carbon2{
    position:absolute;
    top:5px; left:5px; right:-5px; bottom:-5px;
    background:#dcdccb;
    border-radius:2px;
    transform:rotate(-0.4deg);
  }
  .sheet{
    position:relative;
    background:var(--sheet-top);
    border:1px solid var(--paper-edge);
    border-radius:2px;
    padding:22px 20px 26px;
    box-shadow:0 2px 3px rgba(0,0,0,0.08);
  }
  .letterhead{
    text-align:center;
    border-bottom:2px solid var(--ink);
    padding-bottom:12px;
    margin-bottom:16px;
  }
  .letterhead img{
    max-width:78%;
    height:auto;
    margin:0 auto 6px;
    display:block;
  }
  .letterhead .name{
    font-family: "Courier New", ui-monospace, monospace;
    font-weight:700;
    font-size:1.15rem;
    letter-spacing:0.03em;
    text-transform:uppercase;
  }
  .letterhead .place{
    font-size:0.8rem;
    color:var(--ink-soft);
    margin-top:4px;
    letter-spacing:0.05em;
  }
  .stamp-tag{
    display:inline-block;
    margin-top:8px;
    font-family: "Courier New", ui-monospace, monospace;
    font-size:0.68rem;
    color:var(--stamp);
    border:1px solid var(--stamp);
    border-radius:20px;
    padding:2px 10px;
    letter-spacing:0.08em;
    transform:rotate(-2deg);
  }
  label{
    display:block;
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:4px;
    margin-top:14px;
  }
  select, input[type=number]{
    width:100%;
    font-size:1rem;
    padding:10px 10px;
    border:none;
    border-bottom:2px dotted var(--line);
    background:transparent;
    color:var(--ink);
    font-family: inherit;
  }
  select:focus, input:focus{
    outline:none;
    border-bottom:2px solid var(--line);
  }
  .row2{
    display:flex;
    gap:12px;
  }
  .row2 > div{flex:1;}
  .add-btn{
    width:100%;
    margin-top:18px;
    background:var(--ink);
    color:var(--sheet-top);
    border:none;
    padding:12px;
    font-size:0.9rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    border-radius:2px;
    cursor:pointer;
    font-family: "Courier New", ui-monospace, monospace;
  }
  .add-btn:active{transform:translateY(1px);}
  .ruled{
    margin-top:20px;
    border-top:1px dashed var(--paper-edge);
    padding-top:14px;
  }
  .line-item{
    display:flex;
    justify-content:space-between;
    font-family: "Courier New", ui-monospace, monospace;
    font-size:0.85rem;
    padding:5px 0;
    border-bottom:1px dotted var(--paper-edge);
    gap:8px;
  }
  .line-item .desc{color:var(--ink-soft); flex:1;}
  .line-item .val{white-space:nowrap; font-weight:600;}
  .line-item button{
    background:none; border:none; color:var(--danger);
    font-size:0.85rem; cursor:pointer; padding:0 2px;
    font-family: inherit;
  }
  .empty-note{
    font-size:0.78rem;
    color:var(--ink-soft);
    font-style:italic;
    padding:10px 0;
  }
  .total-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-top:16px;
    padding-top:14px;
    border-top:2px solid var(--ink);
  }
  .total-row .label{
    font-size:0.85rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
  }
  .total-row .amount{
    font-family:"Courier New", ui-monospace, monospace;
    font-size:1.6rem;
    font-weight:700;
    color:var(--ink);
  }
  .clear-link{
    display:block;
    text-align:center;
    margin-top:14px;
    font-size:0.78rem;
    color:var(--ink-soft);
    text-decoration:underline;
    background:none;
    border:none;
    cursor:pointer;
    width:100%;
    font-family:inherit;
  }
  .discount-note{
    font-size:0.72rem;
    color:var(--stamp);
    margin-top:6px;
  }
  .whatsapp-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    margin-top:12px;
    background:#25D366;
    color:#0b3b22;
    border:none;
    padding:12px;
    font-size:0.9rem;
    font-weight:700;
    letter-spacing:0.03em;
    border-radius:2px;
    cursor:pointer;
    text-decoration:none;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .whatsapp-btn:active{transform:translateY(1px);}
  .hidden{display:none;}
</style>
</head>

      <div class="place">Nacarôa · Distrito de Nacarôa · Nampula</div>
      <div class="stamp-tag">TALÃO DE ORÇAMENTO</div>
    </div>

    <label for="servico">Serviço</label>
    <select id="servico" onchange="onServiceChange()">
      <option value="copia">Cópia (P&B) — 3 MT/pág</option>
      <option value="impressao">Impressão (P&B) — 4 MT/pág</option>
      <option value="colorida">Impressão/cópia colorida — 50 MT/pág</option>
      <option value="encadernacao">Encadernação</option>
      <option value="plastificacao">Plastificação</option>
      <option value="digitacao">Digitação — 30 MT/pág</option>
      <option value="scanner">Scanner — 35 MT/pág</option>
      <option value="edicao">Edição de documentos — 20 MT/pág</option>
    </select>

    <div id="qtyBlock">
      <label id="qtyLabel" for="qtd">Quantidade de páginas</label>
      <input type="number" id="qtd" min="1" value="1" oninput="updateDiscountNote()">
      <div id="discountNote" class="discount-note hidden"></div>
    </div>

    <div id="plastFormatoBlock" class="hidden">
      <label for="plastFormato">Formato</label>
      <select id="plastFormato">
        <option value="50">A4 — 50 MT</option>
        <option value="35">A5 — 35 MT</option>
        <option value="25">ID — 25 MT</option>
      </select>
    </div>

    <button class="add-btn" onclick="addItem()">+ Adicionar ao talão</button>

    <div class="ruled" id="itemsList">
      <div class="empty-note" id="emptyNote">Nenhum item adicionado ainda.</div>
    </div>

    <div class="total-row">
      <span class="label">Total</span>
      <span class="amount" id="totalAmount">0,00 MT</span>
    </div>

    <button class="whatsapp-btn" onclick="enviarWhatsapp()">📲 Enviar pedido por WhatsApp</button>
    <button class="clear-link" onclick="clearAll()">limpar talão</button>
  </div>
</div>

<script>
let items = [];

const PRICES = {
  copia: 3,
  impressao: 4,
  colorida: 50,
  digitacao: 30,
  scanner: 35,
  edicao: 20
};

function onServiceChange(){
  const s = document.getElementById('servico').value;
  const qtyBlock = document.getElementById('qtyBlock');
  const qtyLabel = document.getElementById('qtyLabel');
  const plastBlock = document.getElementById('plastFormatoBlock');
  const qtd = document.getElementById('qtd');

  plastBlock.classList.add('hidden');
  qtyBlock.classList.remove('hidden');

  if(s === 'encadernacao'){
    qtyLabel.textContent = 'Número de folhas';
    qtd.value = 1;
  } else if(s === 'plastificacao'){
    qtyLabel.textContent = 'Quantidade de unidades';
    plastBlock.classList.remove('hidden');
    qtd.value = 1;
  } else {
    qtyLabel.textContent = 'Quantidade de páginas';
  }
  updateDiscountNote();
}

function updateDiscountNote(){
  const s = document.getElementById('servico').value;
  const qtd = parseInt(document.getElementById('qtd').value) || 0;
  const note = document.getElementById('discountNote');
  if((s === 'copia' || s === 'impressao') && qtd > 50){
    note.textContent = 'Desconto aplicado: -1 MT/pág acima de 50 unidades';
    note.classList.remove('hidden');
  } else {
    note.classList.add('hidden');
  }
}

function calcEncadernacao(folhas){
  if(folhas <= 20) return 35;
  if(folhas <= 60) return 50;
  return 100;
}

function addItem(){
  const s = document.getElementById('servico').value;
  const qtd = parseInt(document.getElementById('qtd').value) || 0;
  if(qtd <= 0){ return; }

  let desc = '';
  let valor = 0;

  if(s === 'encadernacao'){
    valor = calcEncadernacao(qtd);
    desc = `Encadernação (${qtd} folhas)`;
  } else if(s === 'plastificacao'){
    const preco = parseInt(document.getElementById('plastFormato').value);
    const formatoText = document.getElementById('plastFormato').selectedOptions[0].text.split(' —')[0];
    valor = preco * qtd;
    desc = `Plastificação ${formatoText} x${qtd}`;
  } else {
    let preco = PRICES[s];
    if((s === 'copia' || s === 'impressao') && qtd > 50){
      preco = preco - 1;
    }
    valor = preco * qtd;
    const labelMap = {
      copia: 'Cópia', impressao: 'Impressão', colorida: 'Impressão/cópia colorida',
      digitacao: 'Digitação', scanner: 'Scanner', edicao: 'Edição de documentos'
    };
    desc = `${labelMap[s]} x${qtd} pág.`;
  }

  items.push({desc, valor});
  render();
}

function removeItem(idx){
  items.splice(idx, 1);
  render();
}

function clearAll(){
  items = [];
  render();
}

function render(){
  const list = document.getElementById('itemsList');
  const empty = document.getElementById('emptyNote');
  list.innerHTML = '';
  if(items.length === 0){
    list.appendChild(empty);
  } else {
    items.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'line-item';
      row.innerHTML = `<span class="desc">${item.desc}</span><span class="val">${item.valor.toFixed(2)} MT</span><button onclick="removeItem(${idx})">✕</button>`;
      list.appendChild(row);
    });
  }
  const total = items.reduce((sum, i) => sum + i.valor, 0);
  document.getElementById('totalAmount').textContent = total.toFixed(2).replace('.', ',') + ' MT';
}

const WHATSAPP_NUMBER = '258842062475';

function enviarWhatsapp(){
  if(items.length === 0){
    alert('Adicione pelo menos um item ao talão antes de enviar.');
    return;
  }
  let msg = 'Olá! Gostaria de fazer o seguinte pedido na Reprografia Megoa Serviço:%0A%0A';
  items.forEach(item => {
    msg += `• ${item.desc} — ${item.valor.toFixed(2).replace('.', ',')} MT%0A`;
  });
  const total = items.reduce((sum, i) => sum + i.valor, 0);
  msg += `%0A*Total: ${total.toFixed(2).replace('.', ',')} MT*`;
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
  window.open(url, '_blank');
}

onServiceChange();
render();
</script>
</body>
</html>
